name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Start server (smoke test)
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl --fail http://localhost:3001/ || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID
